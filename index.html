<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crazy Taom | O‘zbek Milliy Baraban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1 class="title">
                <span class="neon-text">🍖 CRAZY TAOM 🥘</span>
            </h1>
            <p class="subtitle">O‘zbek Milliy Kazinosi</p>
        </div>

        <div class="wheel-container">
            <div class="led-border"></div>
            <div class="pointer-container">
                <div class="pointer">
                    <div class="pointer-triangle"></div>
                    <div class="pointer-base"></div>
                </div>
            </div>
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
            <div class="center-decor">
                <div class="golden-spinner"></div>
                <div class="center-glow"></div>
            </div>
        </div>

        <div class="controls">
            <button id="spinBtn" class="spin-button">
                <span class="button-text">🔄 SPIN 🔄</span>
                <span class="button-glow"></span>
            </button>
        </div>

        <div id="resultModal" class="result-modal glassmorphism">
            <div class="result-content">
                <h2>🎉 TUSHGAN TAOM 🎉</h2>
                <div id="resultName" class="result-name"></div>
                <div class="result-decoration">✦ ✦ ✦</div>
            </div>
        </div>
    </div>

    <audio id="spinSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/fanfare-6.mp3" type="audio/mpeg">
    </audio>

    <script src="app.js"></script>
</body>
</html>
